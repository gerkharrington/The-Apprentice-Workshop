<!DOCTYPE html>
<html>

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Apprentice Workshop</title>
  <link rel="icon" type="image/x-icon"
    href="https://github.com/gerkharrington/the-apprentice-workshop/blob/main/assets/favicon.png?raw=true">

  <style>
    /* -------------------[ Palette ]------------------- */
    :root {
      --black: #000;
      --very_dark_grey: #181818;
      --dark_grey: #333;
      --light_grey: #777;
      --white: #fff;
      --red: #7a0a0a;
      --light_red: #ae0e0e;

      --type_guest: #f8e71c;
      --type_stranger: #bb11ee;
      --type_spirit: #abddff;

      --radius_main: 8px;
      --radius_border: 2px;

      --size_large: 32px;
      --size_small: 16px;

      --margin_small: 6px;
      --margin_main: 10px;
      --margin_large: 16px;

      --padding_main: 10px;

      --shrink: 0.96;

      --transition_short: 0.2s ease;
      --transition_long: 0.8s ease-out;

      /* This one will change based on which role is selected */
      --type_selected: var(--type_guest);
    }

    /* -------------------[ Keyframe Animations ]------------------- */
    @keyframes animation_blur_in {
      from {
        opacity: 0;
        filter: blur(6px);
        transform: scale(1.01);
      }

      to {
        opacity: 1;
        filter: blur(0);
        transform: scale(1);
      }
    }

    @keyframes animation_slide_right {
      from {
        transform: translateX(-20px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes animation_slide_up {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes animation_fade_in {
      from {
        transform: scale(0.8);
        opacity: 0;
      }

      to {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* -------------------[ Default Styles ]------------------- */
    /* Keeps everything on screen */
    * {
      box-sizing: border-box;
    }

    /* Body text */
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      font-family: sans-serif;
      overflow: hidden;
      background: var(--black);
      color: var(--white);
      animation: animation_blur_in var(--transition_long);
    }

    select {
      width: 150px;
      height: 50px;
      background: var(--very_dark_grey);
      border: var(--radius_border) solid var(--dark_grey);
      border-radius: var(--radius_main);
      padding: var(--padding_main);
      color: var(--white);
      outline: none;
    }

    input,
    textarea {
      width: 100%;
      resize: vertical;
      background: var(--very_dark_grey);
      border: var(--radius_border) solid var(--dark_grey);
      border-radius: var(--radius_main);
      padding: var(--padding_main);
      color: var(--white);
      outline: none;
      transition: var(--transition_short);
      backdrop-filter: blur(6px);
    }

    input:focus,
    textarea:focus {
      border-color: var(--type_selected);
      box-shadow: 0 0 0 var(--radius_border) color-mix(in srgb, var(--type_selected) 40%, transparent);
      transform: translateY(-1px);
    }

    input,
    textarea,
    select,
    button {
      font-family: inherit;
      font-size: var(--size_small);
    }

    h2 {
      /* Header text */
      margin: 0 0 var(--margin_large) 0;
      font-size: var(--size_large);
      line-height: 1.2;
      color: var(--white);
    }

    /* -------------------[ Hidden Elements ]------------------- */
    .hidden {
      display: none !important;
    }

    /* Hidden, but still "there" for screen reader accessibility */
    .fake_hidden {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      border: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
    }

    /* -------------------[ Sidebar Style ]------------------- */
    .sidebar_main {
      width: 250px;
      background: var(--very_dark_grey);
      color: var(--white);
      padding: 20px;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
      border-right: var(--radius_border) solid var(--dark_grey);
      animation: animation_slide_right var(--transition_long);
    }

    .sidebar_list {
      flex: 1;
      overflow-y: auto;
      margin-top: var(--margin_main);
    }

    .sidebar_entry {
      display: flex;
      cursor: pointer;
      align-items: center;
      gap: 10px;
      padding: 8px var(--padding_main);
      margin-bottom: var(--margin_small);
      border-radius: var(--radius_main);
      position: relative;
      overflow: hidden;
      z-index: 0;
      max-height: 60px;
      transition: transform var(--transition_short), opacity var(--transition_short), filter var(--transition_short), background var(--transition_short);
    }

    /* This puts everything above the coloured gradient when you hover over and select a role by increasing its z-index */
    /* The sidebar_delete element is at a z-index above this, so it's in front (priority for clicking) */
    .sidebar_entry>* {
      position: relative;
      z-index: 1;
    }

    .sidebar_entry:hover {
      background: var(--dark_grey);
    }

    .sidebar_entry:active {
      transform: scale(var(--shrink));
    }

    .sidebar_entry.selected {
      padding-left: 6px;
      box-shadow: inset 0 0 0 2px var(--dark_grey);
    }

    .sidebar_entry.sidebar_type_guest.selected {
      border-left: 6px solid var(--type_guest);
    }

    .sidebar_entry.sidebar_type_stranger.selected {
      border-left: 6px solid var(--type_stranger);
    }

    .sidebar_entry.sidebar_type_spirit.selected {
      border-left: 6px solid var(--type_spirit);
    }

    .sidebar_entry.removing {
      opacity: 0;
      transform: translateX(-20px) scale(var(--shrink));
      filter: blur(4px);
      transition: opacity var(--transition_short), transform var(--transition_short), filter var(--transition_short);
    }

    .sidebar_entry::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition_short);
      z-index: 0;
    }

    .sidebar_entry:hover::before {
      opacity: 0.18;
    }

    .sidebar_entry.selected::before {
      opacity: 0.18;
    }

    .sidebar_type_guest::before {
      background: linear-gradient(45deg, var(--type_guest), transparent);
    }

    .sidebar_type_stranger::before {
      background: linear-gradient(45deg, var(--type_stranger), transparent);
    }

    .sidebar_type_spirit::before {
      background: linear-gradient(45deg, var(--type_spirit), transparent);
    }

    .sidebar_add {
      margin: var(--margin_small) 0;
      padding: 5px var(--padding_main);
      cursor: pointer;
      border: none;
      background: var(--dark_grey);
      color: var(--white);
      border-radius: var(--radius_main);
      transition: all var(--transition_short);
    }

    .sidebar_add:hover {
      background: var(--light_grey);
      transform: translateY(-1px);
    }

    .sidebar_add:active {
      transform: scale(var(--shrink));
    }

    .sidebar_delete {
      margin: 0;
      padding: 2px var(--padding_main);
      background: var(--red);
      color: var(--white);
      cursor: pointer;
      border: none;
      border-radius: var(--radius_main);
      transition: transform var(--transition_short), background var(--transition_short);
      /* It's important the z-index is above everything else in the sidebar entry */
      z-index: 2;
    }

    .sidebar_delete:active {
      transform: scale(var(--shrink));
    }

    .sidebar_delete:hover {
      background: var(--light_red);
    }

    .sidebar_container {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
      min-width: 0;
    }

    .sidebar_name {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: right;
    }

    .sidebar_icon {
      width: 24px;
      height: 24px;
      object-fit: cover;
      flex: 0 0 auto;

    }

    .sidebar_list::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar_list::-webkit-scrollbar-thumb {
      background: var(--dark_grey);
      border-radius: var(--radius_main);
    }

    .sidebar_list::-webkit-scrollbar-thumb:hover {
      background: var(--dark_grey);
    }

    .sidebar_type {
      font-size: var(--size_small);
      text-transform: uppercase;
      color: var(--light_grey);
      margin: var(--margin_large) 0 var(--margin_main) 4px;
      letter-spacing: 1px;
      cursor: pointer;
      user-select: none;
      transition: opacity var(--transition_short);
    }

    .sidebar_type:hover {
      opacity: 0.5;
    }

    .sidebar_type .arrow {
      display: inline-block;
      width: var(--size_small);
      text-align: center;
      transition: transform var(--transition_short);
    }

    .sidebar_type .arrow.collapsed {
      transform: rotate(-90deg);
    }

    .sidebar_io_row {
      display: flex;
      gap: var(--margin_small);
    }

    .sidebar_io_row button {
      flex: 1;
    }

    /* -------------------[ Editor Style ]------------------- */
    .editor_main {
      flex: 1;
      padding: 20px;
      animation: animation_slide_up var(--transition_long);
    }

    .editor_empty {
      margin: var(--margin_small) 0;
      padding: var(--padding_main) var(--padding_main);
    }

    .editor_input {
      height: 100px;
      margin-bottom: var(--margin_main);
    }

    .editor_input_name {
      height: 50px;
      margin-bottom: 0;
    }

    .editor_input_top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: var(--margin_main);
    }

    .editor_icon_upload {
      flex: 0 0 50px;
      width: 50px;
      height: 50px;
      position: relative;
      cursor: pointer;
      border: var(--radius_border) dashed var(--light_grey);
      border-radius: var(--radius_main);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: transform var(--transition_short), border var(--transition_short), box-shadow var(--transition_short);
    }

    .editor_icon_upload:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px var(--black);
    }

    .editor_icon_upload.has_icon {
      border: none;
    }

    .editor_icon_placeholder {
      font-size: var(--size_large);
      color: var(--light_grey);
      user-select: none;
      line-height: 1;
      display: block;
      /* A manual offset to the height to fix fonts being weird and lower than usual */
      transform: translateY(-3px);
    }

    .editor_icon_preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      animation: animation_fade_in var(--transition_short);
    }

    .editor_footer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      color: var(--dark_grey);
      font-size: var(--size_small);
      text-align: right;
      pointer-events: none;
      /* Keeps this in front of everything */
      z-index: 9999;
    }
  </style>

</head>

<body>

  <aside class="sidebar_main">
    <!-- Header text -->
    <h2>Roles</h2>
    <!-- The sidebar list itself -->
    <div id="sidebar_list" class="sidebar_list"></div>
    <!-- Add role button -->
    <button id="sidebar_add" class="sidebar_add">+ Add Role</button>
    <!-- Save button -->
    <button id="sidebar_save" class="sidebar_add">Save</button>
    <!-- The import / export row -->
    <div class="sidebar_io_row">
      <button id="sidebar_import" class="sidebar_add">Import</button>
      <button id="sidebar_export" class="sidebar_add">Export</button>
    </div>
    <!-- Hidden file input for importing JSONs -->
    <input id="sidebar_import_file" type="file" accept="application/json" class="fake_hidden">
  </aside>

  <main class="editor_main">
    <h2>The Apprentice Workshop</h2>

    <p id="editor_empty" class="editor_empty">Click "Add Role" to begin workshopping!</p>

    <div id="editor_input" class="hidden">

      <!-- Role Icon Input (Only For Screen Readers) -->
      <input id="single_role_icon" class="fake_hidden" type="file" accept="image/*">

      <div class="editor_input_top">

        <!-- Role Icon Preview & Clickable Area -->
        <div id="editor_icon_upload" class="editor_icon_upload">
          <img id="editor_icon_preview" class="editor_icon_preview" alt="Role Icon">
          <span id="editor_icon_placeholder" class="editor_icon_placeholder">+</span>
        </div>

        <!-- Role Name Input -->
        <label for="single_role_name" class="fake_hidden">Role Name Input</label>
        <input id="single_role_name" class="editor_input_name" placeholder="Untitled Role" type="text">

        <!-- Role Type Input -->
        <select id="single_role_type">
          <option value="Guest">Guest</option>
          <option value="Stranger">Stranger</option>
          <option value="Spirit">Spirit</option>
        </select>

      </div>

      <!-- Ability Text Inputs -->
      <label for="single_role_ability1" class="fake_hidden">Ability 1 Text Input</label>
      <textarea id="single_role_ability1" class="editor_input" placeholder="1st Ability"></textarea>
      <label for="single_role_ability2" class="fake_hidden">Ability 2 Text Input</label>
      <textarea id="single_role_ability2" class="editor_input" placeholder="2nd Ability (Optional)"></textarea>

    </div>
  </main>

  <footer id="editor_footer" class="editor_footer">
    <p>v<span id="editor_footer_version" class="editor_footer_version"></span> | © 2026-<span id="editor_footer_year"
        class="editor_footer_year"></span> Gerk Harrington. All rights
      reserved.
    </p>
  </footer>

  <script>
    /* -------------------[ Site Data ]------------------- */
    const site_version = "0.9.0";

    /* -------------------[ General Variables ]------------------- */
    /* List of all roles */
    let data_roles = [];
    /* Role selected to be edited right now */
    let sidebar_selected = null;
    /* Whether our data is up-to-date with local storage */
    let data_saved = false;
    /* Variable for collapsing role type sections */
    let sidebar_collapsed = {
      Guest: false,
      Stranger: false,
      Spirit: false
    };

    /* -------------------[ Cache Objects In Variables ]------------------- */
    const element_single_role_name = document.getElementById("single_role_name");
    const element_single_role_ability1 = document.getElementById("single_role_ability1");
    const element_single_role_ability2 = document.getElementById("single_role_ability2");
    const element_single_role_icon = document.getElementById("single_role_icon");
    const element_single_role_type = document.getElementById("single_role_type");
    const element_sidebar_list = document.getElementById("sidebar_list");
    const element_sidebar_add = document.getElementById("sidebar_add");
    const element_sidebar_save = document.getElementById("sidebar_save");
    const element_sidebar_import = document.getElementById("sidebar_import");
    const element_sidebar_export = document.getElementById("sidebar_export");
    const element_sidebar_import_file = document.getElementById("sidebar_import_file");
    const element_editor_input = document.getElementById("editor_input");
    const element_editor_empty = document.getElementById("editor_empty");
    const element_editor_icon_preview = document.getElementById("editor_icon_preview");
    const element_editor_icon_upload = document.getElementById("editor_icon_upload");
    const element_editor_icon_placeholder = document.getElementById("editor_icon_placeholder");
    const element_editor_footer_year = document.getElementById("editor_footer_year");
    const element_editor_footer_version = document.getElementById("editor_footer_version");

    /* -------------------[ Update Save Button Text ]------------------- */
    function sidebar_render_save() {
      if (data_saved) {
        element_sidebar_save.textContent = "✓ Saved";
      } else {
        element_sidebar_save.textContent = "Save";
      }
    }

    /* -------------------[ Create & Render Sidebar ]------------------- */
    function sidebar_render() {
      const list = element_sidebar_list;
      list.innerHTML = "";

      /* Hierarchy for role sorting */
      const type_order = ["Guest", "Stranger", "Spirit"];

      type_order.forEach(type => {
        const roles_of_type = data_roles
          .map((role, index) => ({ role, index }))
          .filter(item => (item.role.type || "Guest") === type);

        /* If no roles are of this role type, we don't render this category at all */
        if (roles_of_type.length === 0) return;

        /* Create header text for this role type category */
        const header = document.createElement("div");
        header.className = "sidebar_type";
        /* Add the little arrow to indicate when the category is collapsed */
        const arrow = document.createElement("span");
        arrow.className = "arrow";
        arrow.textContent = "▼";
        if (sidebar_collapsed[type]) {
          arrow.classList.add("collapsed");
        }
        header.appendChild(arrow);
        header.appendChild(document.createTextNode(" " + type));
        /* Code for clicking to collapse / uncollapse the section */
        header.onclick = () => {
          sidebar_collapsed[type] = !sidebar_collapsed[type];
          const arrow = header.querySelector(".arrow");
          arrow.classList.toggle("collapsed");
          setTimeout(() => {
            sidebar_render();
          }, 200);
        };
        list.appendChild(header);

        /* Don't render these roles if the section is collapsed */
        if (sidebar_collapsed[type]) return;

        /* Render all the roles in this category */
        roles_of_type.forEach(({ role, index }) => {
          const div = document.createElement("div");
          div.className = "sidebar_entry";

          /* Add classes for CSS */
          div.classList.add(`sidebar_type_${(role.type || "Guest").toLowerCase()}`);

          if (role.id === sidebar_selected) {
            div.classList.add("selected");
          }

          /* Delete button for this role */
          const sidebar_delete = document.createElement("button");
          sidebar_delete.textContent = "-";
          sidebar_delete.classList.add("sidebar_delete");
          sidebar_delete.onclick = (e) => {
            e.stopPropagation();
            if (!confirm("Delete this role?")) return;
            const element = e.target.closest(".sidebar_entry");
            data_roles_delete(element);
          };

          const container = document.createElement("div");
          container.className = "sidebar_container";

          /* Add the role icon display */
          if (role.icon) {
            const icon = document.createElement("img");
            icon.src = role.icon;
            icon.className = "sidebar_icon";
            icon.alt = "Role Icon";
            container.appendChild(icon);
          }

          const name = document.createElement("span");
          name.textContent = role.name;
          name.className = "sidebar_name";

          /* This is the order of how everything displays in one sidebar slot */
          div.appendChild(sidebar_delete);
          div.appendChild(container);
          div.appendChild(name);

          /* Click this line to select this role */
          div.onclick = () => {
            sidebar_selected = role.id;
            sidebar_render();
            data_roles_load();
          };

          list.appendChild(div);
        });
      });
    }

    /* -------------------[ Generate Unique UUID ]------------------- */
    function data_roles_uuid() {
      return crypto.randomUUID ? crypto.randomUUID() :
        'id_' + Math.random().toString(16).slice(2) + Date.now();
    }

    /* -------------------[ Load From Local Storage ]------------------- */
    function data_storage_load() {
      const saved = localStorage.getItem("data_storage");
      data_saved = true;
      if (saved) {
        try {
          data_roles = JSON.parse(saved);
        } catch (e) {
          data_roles = [];
        }
      }
    }

    /* -------------------[ Export As JSON ]------------------- */
    function data_export() {
      const blob = new Blob([JSON.stringify(data_roles, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "roles.json";
      a.click();
      URL.revokeObjectURL(url);
    }
    /* -------------------[ Import From JSON ]------------------- */
    function data_import(file) {
      if (!file) return;
      const sidebar_file_reader = new FileReader();
      sidebar_file_reader.onload = function (e) {
        try {
          const parsed = JSON.parse(e.target.result);
          if (!Array.isArray(parsed)) { return; }
          data_roles = parsed;
          sidebar_selected = data_roles.length ? data_roles[0].id : null;
          data_saved = false;
          sidebar_render();
          sidebar_render_save();
          if (sidebar_selected) {
            data_roles_load();
          } else {
            editor_clear();
          }
        } catch (err) {
          alert("Failed to load file! Please try another file.\nError B-4: File JSON is invalid.");
        }
      };
      sidebar_file_reader.readAsText(file);
    }

    /* -------------------[ Add New Role ]------------------- */
    function data_roles_add() {
      /* Choose what type the role will be created as (guest by default) */
      const default_role_type = sidebar_selected !== null ? (data_roles.find(r => r.id === sidebar_selected)?.type || "Guest") : "Guest";
      /* This adds the actual role with all default data */
      data_roles.push({
        id: data_roles_uuid(),
        name: "Untitled Role",
        ability1: "",
        ability2: "",
        icon: "",
        type: default_role_type
      });
      sidebar_selected = data_roles[data_roles.length - 1].id;
      sidebar_render();
      data_saved = false;
      sidebar_render_save();
      data_roles_load();
    }

    /* -------------------[ Delete Role ]------------------- */
    function data_roles_delete(element) {
      if (!element) return;
      const on_transition_end = (e) => {
        if (e.propertyName !== "opacity") return;
        element.removeEventListener("transitionend", on_transition_end);
        /* Properly delete the role after the animation plays */
        data_roles = data_roles.filter(r => r.id !== sidebar_selected);
        /* Select a new role */
        if (data_roles.length === 0) {
          sidebar_selected = null;
        } else {
          sidebar_selected = data_roles[0].id;
        }
        /* Re-render and set some variables */
        sidebar_render();
        data_saved = false;
        sidebar_render_save();
        data_roles_load();
      };
      element.addEventListener("transitionend", on_transition_end);
      element.classList.add("removing");
    }

    /* -------------------[ Load Roles ]------------------- */
    function data_roles_load() {
      const role = data_roles.find(r => r.id === sidebar_selected);
      if (!role) {
        editor_clear();
        return;
      }
      element_single_role_name.value = role.name;
      element_single_role_ability1.value = role.ability1;
      element_single_role_ability2.value = role.ability2;
      element_single_role_type.value = role.type || "Guest";
      editor_icon_update(role.icon);
      editor_set_visible(true);
      /* Update input and textarea highlight colour */
      let colour = getComputedStyle(document.documentElement).getPropertyValue("--type_guest").trim();
      if (role.type === "Stranger") {
        colour = getComputedStyle(document.documentElement).getPropertyValue("--type_stranger").trim();
      } else if (role.type === "Spirit") {
        colour = getComputedStyle(document.documentElement).getPropertyValue("--type_spirit").trim();
      }
      document.documentElement.style.setProperty("--type_selected", colour);
    }

    /* -------------------[ Clear Editor For When No Roles Are There ]------------------- */
    function editor_clear() {
      element_single_role_name.value = "";
      element_single_role_icon.value = "";
      element_single_role_ability1.value = "";
      element_single_role_ability2.value = "";
      element_single_role_type.value = "Guest";
      element_editor_icon_preview.style.display = "none";
      element_editor_icon_preview.src = "";
      element_editor_icon_upload.classList.remove("has_icon");
      editor_set_visible(false);
    }

    /* -------------------[ Show / Hide Editor ]------------------- */
    function editor_set_visible(isVisible) {
      element_editor_input.classList.toggle("hidden", !isVisible);
      element_editor_empty.classList.toggle("hidden", isVisible);
    }

    /* -------------------[ Handle File Reader For Image Upload ]------------------- */
    function editor_icon_upload(file, onSuccess) {
      if (!file) {
        alert("Failed to load file! Please try another file.\nError A-1: No file uploaded.");
        return;
      }
      if (!file.type) {
        alert("Failed to load file! Please try another file.\nError B-1: File type data not found.");
        return;
      }
      if (!file.type.startsWith("image/")) {
        alert("Failed to load file! Please try another file.\nError B-2: Not a valid image file type.");
        return;
      }
      if (file.size > 2 * 1024 * 1024) {
        alert("Failed to load file! Please try another file.\nError B-3: File size is dangerously large (>2MB).");
        return;
      }
      const editor_file_reader = new FileReader();
      editor_file_reader.onload = function (e) {
        onSuccess(e.target.result);
      };
      editor_file_reader.onerror = function () {
        alert("Failed to load file! Please try another file.\nError A-2: File reader error.");
      };
      editor_file_reader.readAsDataURL(file);
    }

    /* -------------------[ Show / Hide Stuff For Icon Upload ]------------------- */
    function editor_icon_update(icon) {
      if (icon) {
        /* We do have an icon */
        element_editor_icon_preview.src = icon;
        element_editor_icon_preview.style.display = "block";
        element_editor_icon_placeholder.style.display = "none";
        element_editor_icon_upload.classList.add("has_icon");
      } else {
        /* We do not have an icon */
        element_editor_icon_preview.src = "";
        element_editor_icon_preview.style.display = "none";
        element_editor_icon_placeholder.style.display = "block";
        element_editor_icon_upload.classList.remove("has_icon");
      }
    }

    /* -------------------[ Event Listeners ]------------------- */
    /* Changing role name */
    element_single_role_name.addEventListener("input", function () {
      if (sidebar_selected === null) return;
      if (this.value.trim() === "") {
        data_roles.find(r => r.id === sidebar_selected).name = "Untitled Role";
      } else {
        const role = data_roles.find(r => r.id === sidebar_selected);
        if (!role) return;
        role.name = this.value;
      }
      sidebar_render();
      data_saved = false;
      sidebar_render_save();
    });

    /* Changing ability 1 */
    element_single_role_ability1.addEventListener("input", function () {
      if (sidebar_selected === null) return;
      const role = data_roles.find(r => r.id === sidebar_selected);
      if (!role) return;
      role.ability1 = this.value;
      data_saved = false;
      sidebar_render_save();
    });

    /* Changing ability 2 */
    element_single_role_ability2.addEventListener("input", function () {
      if (sidebar_selected === null) return;
      const role = data_roles.find(r => r.id === sidebar_selected);
      if (!role) return;
      role.ability2 = this.value;
      data_saved = false;
      sidebar_render_save();
    });

    /* Changing image icon */
    element_single_role_icon.addEventListener("change", function () {
      if (sidebar_selected === null) return;
      const file = this.files[0];
      editor_icon_upload(file, (icon) => {
        const role = data_roles.find(r => r.id === sidebar_selected);
        if (!role) return;
        role.icon = icon;
        editor_icon_update(icon);
        sidebar_render();
        data_saved = false;
        sidebar_render_save();
      });
    });

    /* Changing role type */
    element_single_role_type.addEventListener("change", function () {
      if (sidebar_selected === null) return;
      const role = data_roles.find(r => r.id === sidebar_selected);
      if (!role) return;
      role.type = this.value;
      sidebar_render();
      data_saved = false;
      sidebar_render_save();
      /* Update input and textarea highlight colour */
      let colour = getComputedStyle(document.documentElement).getPropertyValue("--type_guest").trim();
      if (role.type === "Stranger") {
        colour = getComputedStyle(document.documentElement).getPropertyValue("--type_stranger").trim();
      } else if (role.type === "Spirit") {
        colour = getComputedStyle(document.documentElement).getPropertyValue("--type_spirit").trim();
      }
      document.documentElement.style.setProperty("--type_selected", colour);
    });

    /* Makes the "Add Role" button clickable to add a new role */
    element_sidebar_add.addEventListener("click", data_roles_add);

    /* Makes the "Save" button clickable to save all data to local storage */
    element_sidebar_save.addEventListener("click", () => {
      localStorage.setItem("data_storage", JSON.stringify(data_roles));
      data_saved = true;
      sidebar_render_save();
    });

    /* Makes the icon in the editor clickable to upload a different one */
    element_editor_icon_upload.addEventListener("click", () => { element_single_role_icon.click(); });

    /* Makes the export button clickable to export a JSON file */
    element_sidebar_export.addEventListener("click", data_export);

    /* Makes the import button clickable to load a JSON file (it technically "clicks" the hidden file upload area) */
    element_sidebar_import.addEventListener("click", () => {
      if (confirm("This will override all current data. Continue?")) { element_sidebar_import_file.click(); }
    });

    /* Checks the hidden import file upload area for importing a JSON (indirectly "clicked" by the import button) */
    element_sidebar_import_file.addEventListener("change", function () {
      const file = this.files[0];
      data_import(file);
      this.value = "";
    });

    /* -------------------[ Drag & Drop Icons ]------------------- */
    /* Event listeners for all drap & drop related actions */
    ["dragenter", "dragover", "dragleave", "drop"].forEach(event => {
      element_editor_icon_upload.addEventListener(event, (e) => {
        e.preventDefault();
        e.stopPropagation();
      });
    });
    /* The actual code for uploading a file through drag & drop */
    element_editor_icon_upload.addEventListener("drop", (e) => {
      if (sidebar_selected === null) return;
      const file = e.dataTransfer.files[0];
      editor_icon_upload(file, (icon) => {
        const role = data_roles.find(r => r.id === sidebar_selected);
        if (!role) return;
        role.icon = icon;
        editor_icon_update(icon);
        sidebar_render();
        data_saved = false;
        sidebar_render_save();
      });
    });

    /* -------------------[ Unsaved Changes Warning ]------------------- */
    window.addEventListener("beforeunload", function (e) {
      if (!data_saved) {
        e.preventDefault();
        e.returnValue = "";
      }
    });

    /* -------------------[ Keyboard Shortcuts ]------------------- */
    window.addEventListener("keydown", function (e) {
      /* Detect keys (Windows "Ctrl" and Mac "command") */
      const key_ctrl = e.ctrlKey || e.metaKey;
      /* Ctrl + S (Save data) */
      if (key_ctrl && e.key.toLowerCase() === "s") {
        e.preventDefault();
        element_sidebar_save.click();
        return;
      }
      /* Ctrl + Enter (Add new role) */
      if (key_ctrl && e.key.toLowerCase() === "enter") {
        e.preventDefault();
        data_roles_add();
        return;
      }
      /* Ctrl + Delete (Delete role) */
      if (key_ctrl && (e.key.toLowerCase() === "delete" || e.key.toLowerCase() === "backspace")) {
        e.preventDefault();
        if (sidebar_selected === null) return;
        const role = data_roles.find(r => r.id === sidebar_selected);
        if (!role) return;
        const element = document.querySelector(".sidebar_entry.selected");
        if (element) {
          element.classList.add("removing");
        }
        data_roles_delete();
        return;
      }
    });

    /* -------------------[ Innitiate Editor (This Runs On Page Load) ]------------------- */
    /* Add the relevant data to the footer */
    element_editor_footer_year.textContent = new Date().getFullYear();
    element_editor_footer_version.textContent = site_version;
    data_storage_load();
    if (data_roles.length === 0) {
      editor_clear();
    } else {
      sidebar_selected = data_roles[0].id;
      data_roles_load();
    }
    sidebar_render();
    sidebar_render_save();

  </script>

</body>

</html>
